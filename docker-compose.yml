services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devpulse-api
    environment:
      APP_ENV: development
      APP_MODE: api
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://devpulse:devpulse@postgres:5432/devpulse?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: devpulse-dev-secret-change-me
      AI_PROVIDER: openai
      GITHUB_MODE: mock
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: devpulse-postgres
    environment:
      POSTGRES_DB: devpulse
      POSTGRES_USER: devpulse
      POSTGRES_PASSWORD: devpulse
    ports:
      - "5432:5432"
    volumes:
      - devpulse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devpulse -d devpulse"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: devpulse-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - devpulse_redisdata:/data

volumes:
  devpulse_pgdata:
  devpulse_redisdata:

